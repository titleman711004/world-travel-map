<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旅遊足跡</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --panel-bg: rgba(255, 255, 255, 0.98); --primary: #2c3e50; }
        body { margin: 0; font-family: "Microsoft JhengHei", sans-serif; overflow: hidden; background: #d1ecf1; }
        
        /* 確保地圖容器有明確高度 */
        #map { height: 100vh; width: 100vw; background: #d1ecf1; }

        /* 載入中動畫 */
        #loader {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 2000; background: rgba(0,0,0,0.7); color: white;
            padding: 15px 25px; border-radius: 30px; display: block;
        }

        /* --- 工具列樣式 --- */
        .side-panel {
            position: fixed; z-index: 1001;
            background: var(--panel-bg);
            box-shadow: 0 -2px 20px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }

        @media (min-width: 769px) {
            .side-panel {
                top: 20px; left: 20px; width: 280px;
                border-radius: 0px; max-height: 90vh;
                padding: 20px; display: flex; flex-direction: column; gap: 10px;
            }
            .mobile-handle { display: none; }
        }

        @media (max-width: 768px) {
            .side-panel {
                bottom: 0; left: 0; right: 0; width: 100%;
                border-radius: 20px 20px 0 0;
                padding: 0 15px 15px 15px;
                transform: translateY(calc(100% - 45px));
            }
            .side-panel.open { transform: translateY(0); }
            .mobile-handle {
                height: 45px; display: flex; align-items: center; justify-content: center;
                font-weight: bold; color: var(--primary); cursor: pointer;
            }
            .panel-content { max-height: 50vh; overflow-y: auto; }
        }

        .section-title { font-size: 14px; font-weight: bold; margin-top: 10px; border-left: 4px solid var(--primary); padding-left: 8px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin: 10px 0; }
        .btn { padding: 8px; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; text-align: center; color: white; }
        .btn-reset { background: #7f8c8d; }
        .btn-save { background: #27ae60; }
        .btn-load { background: #2980b9; }
        
        #country-list { list-style: none; padding: 0; margin: 0; border-top: 1px solid #eee; }
        #country-list li { padding: 10px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; font-size: 14px; cursor: pointer; }
        
        .popup-btn { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 4px; margin-top: 8px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div id="loader">🌍 地圖資料載入中...</div>
<div id="map"></div>

<div class="side-panel" id="ui-panel">
    <div class="mobile-handle" onclick="togglePanel()">展開/收合</div>
    <div class="panel-content">
        <div class="section-title">🎨 地圖風格</div>
        <div style="display: flex; gap: 5px; margin-top:5px;">
            <select id="bg-color-select" onchange="updateStyles()" style="flex:1; padding:5px;">
                <option value="#d1ecf1" selected>海洋：藍</option>
                <option value="#333333">海洋：黑</option>
            </select>
            <select id="visit-color-select" onchange="updateStyles()" style="flex:1; padding:5px;">
                <option value="#ff4757" selected>足跡：紅</option>
                <option value="#ffa502">足跡：橘</option>
            </select>
        </div>

        <div class="section-title">💾 備份與匯入</div>
        <div class="btn-group">
            <button class="btn btn-reset" onclick="resetView()">🌐 全圖</button>
            <button class="btn btn-save" onclick="exportBackup()">📋 備份</button>
            <button class="btn btn-load" onclick="triggerImport()">📥 匯入</button>
        </div>

        <div class="section-title">📍 已去過</div>
        <ul id="country-list"></ul>
    </div>
</div>

<script>
let visitedCountries = JSON.parse(localStorage.getItem('myVisitedCountries')) || [];
let geoLayer, poiLayers = L.layerGroup();

const customPOIs = [
    { name: "Guam (關島)", coords: [13.4443, 144.7937] },
    { name: "Subic Bay (蘇比克灣)", coords: [14.8219, 120.2762] }
];

// 1. 初始化地圖
const map = L.map('map', {
    attributionControl: false,
    zoomSnap: 0.1,
    zoomControl: false,
    maxBounds: [[-90, -200], [90, 200]],
    maxBoundsViscosity: 1.0
});

// 設定初始視角
function autoFitWorld() {
    const zoomLevel = window.innerWidth < 768 ? 1.2 : 2.2;
    map.setView([20, 10], zoomLevel);
}
autoFitWorld();
poiLayers.addTo(map);

// 2. 獲取資料並渲染
const geoJsonUrl = 'https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson';

fetch(geoJsonUrl)
    .then(r => {
        if (!r.ok) throw new Error("網路請求失敗");
        return r.json();
    })
    .then(data => {
        document.getElementById('loader').style.display = 'none'; // 隱藏載入提示
        geoLayer = L.geoJson(data, {
            style: styleFunc,
            onEachFeature: (f, l) => {
                l.on('click', (e) => {
                    const name = f.properties.name;
                    showPopup(e.latlng, name);
                });
            }
        }).addTo(map);
        updateUI();
    })
    .catch(err => {
        document.getElementById('loader').innerText = "❌ 載入失敗，請檢查網路！";
        console.error(err);
    });

function styleFunc(feature) {
    const visitColor = document.getElementById('visit-color-select').value;
    return {
        fillColor: visitedCountries.includes(feature.properties.name) ? visitColor : "#e9e9e9",
        weight: 1, color: "#ffffff", fillOpacity: 1
    };
}

function showPopup(latlng, name) {
    const isVisited = visitedCountries.includes(name);
    const btnText = isVisited ? "❌ 移除足跡" : "✅ 標記足跡";
    L.popup()
        .setLatLng(latlng)
        .setContent(`<strong>${name}</strong><br><button class="popup-btn" onclick="toggleCountry('${name}')">${btnText}</button>`)
        .openOn(map);
}

function updateStyles() {
    document.getElementById('map').style.background = document.getElementById('bg-color-select').value;
    if (geoLayer) geoLayer.setStyle(styleFunc);
    drawCustomPOIs();
}

function drawCustomPOIs() {
    poiLayers.clearLayers();
    const visitColor = document.getElementById('visit-color-select').value;
    customPOIs.forEach(poi => {
        const isVisited = visitedCountries.includes(poi.name);
        const circle = L.circleMarker(poi.coords, {
            radius: 1, fillColor: isVisited ? visitColor : "#e9e9e9",
            color: "#333", weight: 0, fillOpacity: 1
        }).addTo(poiLayers);

        circle.on('click', (e) => {
            L.DomEvent.stopPropagation(e);
            showPopup(poi.coords, poi.name);
        });
    });
}

function toggleCountry(name) {
    const i = visitedCountries.indexOf(name);
    if (i > -1) visitedCountries.splice(i, 1);
    else visitedCountries.push(name);
    localStorage.setItem('myVisitedCountries', JSON.stringify(visitedCountries));
    updateUI();
    map.closePopup();
}

function updateUI() {
    updateStyles();
    const listEl = document.getElementById('country-list');
    listEl.innerHTML = visitedCountries.length > 0 
        ? visitedCountries.map(name => `<li onclick="focusCountry('${name}')">📍 ${name}</li>`).join('')
        : '<li style="color:#999; justify-content:center;">尚未標記任何足跡</li>';
}

function focusCountry(name) {
    if (window.innerWidth <= 768) togglePanel();
    let found = false;
    geoLayer.eachLayer(layer => {
        if (layer.feature.properties.name === name) {
            map.flyToBounds(layer.getBounds(), { padding: [50, 50], duration: 1.2 });
            found = true;
        }
    });
    if (!found) {
        const poi = customPOIs.find(p => p.name === name);
        if (poi) map.flyTo(poi.coords, 7, { duration: 1.2 });
    }
}

function togglePanel() {
    if (window.innerWidth <= 768) {
        document.getElementById('ui-panel').classList.toggle('open');
    }
}

function resetView() { autoFitWorld(); }

function exportBackup() {
    const data = JSON.stringify(visitedCountries);
    navigator.clipboard.writeText(data).then(() => alert("✅ 備份代碼已複製到剪貼簿！"));
}

function triggerImport() {
    const code = prompt("請貼上您的備份代碼：");
    if (code) {
        try {
            visitedCountries = JSON.parse(code);
            localStorage.setItem('myVisitedCountries', JSON.stringify(visitedCountries));
            updateUI();
            alert("匯入成功！");
        } catch (e) { alert("代碼解析失敗，請確保貼上的是完整 JSON。"); }
    }
}

// 修正：視窗縮放時自動調整
window.addEventListener('resize', () => {
    if (geoLayer) { /* 不強制重置以免打擾操作 */ }
});
</script>

</body>
</html>
